services:
  whatsapp-mcp:
    image: ghcr.io/${GITHUB_REPO:-your-username/whatsapp-mcp-docker}:latest
    container_name: whatsapp-mcp
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - MCP_PORT=3010
      - LOG_LEVEL=info
      - WHATSAPP_MCP_DATA_DIR=/app/data
      - WHATSAPP_AUTH_DIR=/app/auth_info
    volumes:
      - whatsapp_data:/app/data
      - whatsapp_auth:/app/auth_info
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3010/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  whatsapp_data:
  whatsapp_auth:
