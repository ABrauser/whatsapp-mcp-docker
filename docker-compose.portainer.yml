## Portainer Stack - WhatsApp MCP Server
## Deploy this file as a stack in Portainer.
## Image: ghcr.io/abrauser/whatsapp-mcp-docker:latest

services:
  whatsapp-mcp:
    image: ghcr.io/abrauser/whatsapp-mcp-docker:latest
    container_name: whatsapp-mcp
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - MCP_PORT=3010
      - TZ=Europe/Berlin
      - LOG_LEVEL=info
      - WHATSAPP_MCP_DATA_DIR=/app/data
      - WHATSAPP_AUTH_DIR=/app/auth_info
    volumes:
      - /opt/docker/whatsapp-mcp/data:/app/data
      - /opt/docker/whatsapp-mcp/auth_info:/app/auth_info
